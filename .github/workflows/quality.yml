name: quality

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt -c requirements-lock.txt

      - name: Unit and integration tests
        run: pytest -q

      - name: Ruff
        run: ruff check app tests streamlit_app.py scripts

      - name: Data and scenario check
        run: python -m app.cli check

      - name: Repository audit
        run: python -m app.cli audit --strict

      - name: End-to-end release check
        run: python -m app.cli release-check --algorithm ALL --cp-sat-time-limit 2
