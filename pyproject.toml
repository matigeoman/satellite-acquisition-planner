[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"

[tool.ruff]
target-version = "py311"
line-length = 88
exclude = [
    ".git",
    ".pytest_cache",
    ".ruff_cache",
    ".venv",
    "venv",
    "data",
]

[tool.ruff.lint]
# Reguły skoncentrowane na błędach wykonania, niezdefiniowanych nazwach
# i zbędnych importach. Długość wierszy pozostaje obsługiwana przez formatter.
select = ["E4", "E7", "E9", "F"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"streamlit_app.py" = ["E402"]
"app/**/__init__.py" = ["F401"]
